id: 2
name: llm-eval-harness
program:
  id: ai-evaluation-retrieval
  narrative_fit: Defines the artifact-driven answer-quality measurement layer used by the AI Evaluation and RAG Platform.
  shared_assets:
    - prediction artifact schema
    - deterministic EM and token F1 evaluator
    - portfolio-compatible result JSON
status: benchmarked
claim: Artifact-driven local evaluator for RAG/LLM answers with exact match, token F1, producer identity, and strict case-ID validation.
stack:
  - python
  - json-schema
  - jsonl
  - argparse
  - unittest
  - docker
language_profile:
  primary: python
  secondary: []
  reason: Metrics, artifact validation, and CLI orchestration are deterministic and independently testable.
decision_brain:
  agent_graph:
    mode: principal-agent-orchestrated
    source: .portfolio/decision-brain/agent-graph.yaml
    handoff: sdd/agent-handoff.md
    local_first_runtime: docker
  reuse_improvement_loop:
    source: .portfolio/decision-brain/reuse-improvement-loop.yaml
    review_path: sdd/reuse-improvement-review.md
    current_status: backlog_recorded
  principles:
    coupling_rule: Producers and evaluator exchange versioned files; neither imports the other's code.
    solid: [srp, ocp, lsp, isp, dip]
    simplicity_rule: Validate a small versioned artifact before introducing queues or hosted evaluation services.
    testability_rule: Metrics and validation run without HTTP, cloud, paid credentials, or producer runtime.
  stack_profile: python
  api_style: cli-first
  messaging: artifact-file
  cloud:
    mode: none
    local_provider: kumo
    real_provider_target: none
    adapter_rule: Future artifact stores stay outside metric and validation code.
  database: fixture-files
  runtime: python-cli
  library_policy: Keep core metrics and contract validation in the standard library.
  record_path: sdd/technical-decision.md
architecture:
  style: pipeline-with-contract-boundary
  reason: Reference loading, producer artifact validation, alignment, metrics, and result emission have separate responsibilities.
  dependency_rule: CLI depends on artifact and evaluator modules; producer repositories depend only on the JSON schema.
design_system:
  tokens: .portfolio/design-system/tokens.yaml
  readme_components: [readme_header, benchmark_card, architecture_card, references_table]
  diagram_required: true
reuse:
  kit_version: local
  uses: [catalog, programs, decision-brain, reuse-improvement-loop, architecture, language-profiles, design-system, sdd, harness, templates, skills]
benchmark:
  primary_metric: f1
  unit: ratio
  command: python -m llm_eval_harness benchmark --references data/fixtures/references.jsonl --predictions data/fixtures/rag-predictions.v1.json --output benchmarks/results/llm-eval-baseline.json
  result_path: benchmarks/results/llm-eval-baseline.json
release:
  docker: Dockerfile
  no_secret_default_path: true
  readme_has_number: true
  references_documented: true
