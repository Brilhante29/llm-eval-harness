name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Run benchmark
        run: python -m llm_eval_harness benchmark --output benchmarks/results/llm-eval-baseline.json
